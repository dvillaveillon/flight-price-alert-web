# ==========================================================================
# GitHub Actions — Revision automatica de precios cada 6 horas
# --------------------------------------------------------------------------
# Ejecuta check_prices.py de forma programada e independiente de la web.
# Las credenciales se inyectan desde GitHub Secrets (Settings > Secrets and
# variables > Actions). Si no defines secrets, corre en modo demo (mock + CSV),
# pero recuerda: en Actions el CSV NO persiste entre corridas. Para persistencia
# real usa Supabase (define SUPABASE_URL y SUPABASE_KEY como secrets).
# ==========================================================================

name: check-prices

on:
  schedule:
    # Cron en UTC: minuto 0, cada 6 horas (00:00, 06:00, 12:00, 18:00).
    - cron: "0 */6 * * *"
  workflow_dispatch: {}   # permite lanzarlo manualmente desde la pestana Actions

jobs:
  check-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar revision de precios
        env:
          FLIGHT_PROVIDER: ${{ secrets.FLIGHT_PROVIDER }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          AMADEUS_CLIENT_ID: ${{ secrets.AMADEUS_CLIENT_ID }}
          AMADEUS_CLIENT_SECRET: ${{ secrets.AMADEUS_CLIENT_SECRET }}
          DUFFEL_ACCESS_TOKEN: ${{ secrets.DUFFEL_ACCESS_TOKEN }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          SENDGRID_FROM_EMAIL: ${{ secrets.SENDGRID_FROM_EMAIL }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_FROM: ${{ secrets.TWILIO_WHATSAPP_FROM }}
          NOTIFY_COOLDOWN_HOURS: ${{ secrets.NOTIFY_COOLDOWN_HOURS }}
        run: python check_prices.py
