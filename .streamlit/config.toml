# Tema visual de marca (somosrata).
# Turquesa #16B8B8 (primario/botones), azul oscuro #0B1F3A (texto/titulos).
[theme]
primaryColor = "#16B8B8"
backgroundColor = "#F8FAFC"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#0B1F3A"
font = "sans serif"

[server]
headless = true

[browser]
gatherUsageStats = false
